<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 150" width="240" height="150" role="img" aria-label="A stopwatch showing a fast review time">
  <rect width="240" height="150" fill="#DDF7EC"/>
  <circle cx="200" cy="38" r="26" fill="#fff" opacity=".55"/>
  <circle cx="40" cy="118" r="18" fill="#fff" opacity=".5"/>
  <!-- motion lines -->
  <g stroke="#13C783" stroke-width="5" stroke-linecap="round" opacity=".55">
    <line x1="24" y1="60" x2="54" y2="60"/>
    <line x1="18" y1="78" x2="50" y2="78"/>
    <line x1="26" y1="96" x2="52" y2="96"/>
  </g>
  <!-- stopwatch -->
  <g transform="translate(132 78)">
    <rect x="-10" y="-58" width="20" height="11" rx="4" fill="#0E9E68"/>
    <line x1="0" y1="-50" x2="0" y2="-42" stroke="#0E9E68" stroke-width="7" stroke-linecap="round"/>
    <circle cx="0" cy="2" r="44" fill="#13C783"/>
    <circle cx="0" cy="2" r="35" fill="#fff"/>
    <path d="M-12 2 l9 9 17 -19" stroke="#13C783" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
